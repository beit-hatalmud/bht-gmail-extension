<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<title>מעקב התנהגות</title>
<style>
body { font-family: 'Heebo', Arial, sans-serif; margin: 0; padding: 14px; width: 280px; direction: rtl; color: #1f2937; }
h3 { margin: 0 0 12px; color: #0066cc; font-size: 16px; }
.btn { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; text-align: right; cursor: pointer; font-size: 13px; color: #1f2937; }
.btn:hover { background: #e0f2fe; border-color: #0066cc; }
.btn.primary { background: #0066cc; color: #fff; border-color: #0066cc; }
.btn.primary:hover { background: #0052a3; }
.status { background: #f0f9ff; padding: 8px; border-radius: 6px; font-size: 12px; margin-bottom: 10px; border: 1px solid #bae6fd; }
.mini { color: #6b7280; font-size: 11px; }
.err { color: #dc2626; }
</style>
</head>
<body>
<h3>🎓 מעקב התנהגות - בית התלמוד</h3>
<div class="status" id="status">בודק חיבור...</div>
<button class="btn primary" id="open-site">פתח את האתר המלא</button>
<button class="btn" id="behavior">מעקב התנהגות</button>
<button class="btn" id="forms">חתימות הורים</button>
<button class="btn" id="tasks">משימות</button>
<button class="btn" id="card">כרטיס תלמיד</button>
<button class="btn" id="phone-info">קו טלפוני /8</button>
<script src="popup.js"></script>
</body>
</html>
